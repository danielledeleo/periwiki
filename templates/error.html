{{define "content"}}
<div id="article-area">
    <article>
    {{with .Error }}
        <h1>{{.Code}} {{statusText .Code}}</h1>
        <div class="pw-article-content">
            {{range .Errors}}
                <div>{{print . | capitalize }}</div>
            {{end}}
        </div>
    </article>
    {{end}}
</div>
{{end}}
